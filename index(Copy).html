<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemilu Ketua OSIS - SMKN 5 Kota Madiun</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F4E8C1;
            --dark: #1a1a2e;
            --darker: #16213e;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 50%, #0f0f23 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .hidden {
            display: none !important;
        }

        /* Typography */
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }

        /* Setup Page */
        .setup-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 1s ease;
        }

        .brand-header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold) 0%, #fff 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .brand-header p {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .setup-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeInUp 1s ease;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-group label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--gold-light);
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            color: #fff;
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            background: rgba(0,0,0,0.5);
        }

        .photo-mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .mode-option {
            flex: 1;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }

        .mode-option:hover {
            border-color: rgba(212, 175, 55, 0.5);
            transform: translateY(-2px);
        }

        .mode-option.active {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .mode-option .icon {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        .mode-option .label {
            font-weight: 600;
            color: var(--gold-light);
            font-size: 0.9rem;
        }

        .btn-elegant {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--gold) 0%, #B8941F 100%);
            color: var(--dark);
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
        }

        .btn-elegant::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .btn-elegant:hover::before {
            left: 100%;
        }

        .btn-elegant:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
        }

        /* Voting Page */
        .voting-page {
            animation: fadeIn 0.8s ease;
            padding-top: 20px;
        }

        .main-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .main-header h2 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold) 0%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .main-header .period {
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .candidate-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            transition: all 0.4s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .candidate-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .candidate-number {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--gold) 0%, #B8941F 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--dark);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            z-index: 10;
        }

        .vote-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid var(--gold);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vote-counter .count {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            min-width: 40px;
            text-align: center;
        }

        .vote-counter .label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Photo Container Styles */
        .photos-wrapper {
            padding: 80px 30px 30px;
            background: linear-gradient(180deg, rgba(212, 175, 55, 0.05) 0%, transparent 100%);
        }

        /* Mode: Separate (Default) */
        .photos-separate {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .photo-box {
            flex: 1;
            max-width: 180px;
        }

        .photo-upload {
            aspect-ratio: 3/4;
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
        }

        .photo-upload:hover {
            border-color: var(--gold);
            background: rgba(0,0,0,0.5);
            transform: scale(1.02);
        }

        .photo-upload.has-image {
            border: none;
            background: none;
        }

        .photo-upload img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 18px;
        }

        .upload-placeholder {
            text-align: center;
            padding: 20px;
        }

        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            opacity: 0.6;
        }

        .upload-text {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            font-weight: 500;
        }

        .photo-label {
            margin-top: 15px;
            text-align: center;
        }

        .photo-label .name {
            font-weight: 700;
            color: var(--gold-light);
            font-size: 1rem;
            margin-bottom: 3px;
        }

        .photo-label .role {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Mode: Combined */
        .photos-combined {
            display: flex;
            justify-content: center;
        }

        .photos-combined .photo-box {
            max-width: 280px;
            width: 100%;
        }

        .photos-combined .photo-upload {
            aspect-ratio: 16/10;
        }

        .photos-combined .photo-label {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .photos-combined .photo-label .candidate-info {
            text-align: center;
        }

        /* Vote Button */
        .vote-action {
            padding: 0 30px 30px;
        }

        .btn-vote {
            width: 100%;
            padding: 20px;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .btn-vote::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: var(--gold);
            transition: width 0.3s ease;
            z-index: -1;
        }

        .btn-vote:hover {
            color: var(--dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .btn-vote:hover::before {
            width: 100%;
        }

        .btn-vote:active {
            transform: translateY(0);
        }

        /* Invalid Votes Section */
        .invalid-section {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .invalid-section h3 {
            color: #e74c3c;
            font-size: 1.5rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .invalid-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .btn-control {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-minus {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            border: 2px solid #e74c3c;
        }

        .btn-minus:hover {
            background: #e74c3c;
            color: white;
            transform: scale(1.1);
        }

        .btn-plus {
            background: #e74c3c;
            color: white;
            border: 2px solid #e74c3c;
        }

        .btn-plus:hover {
            background: #c0392b;
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
        }

        .invalid-display {
            min-width: 120px;
        }

        .invalid-display .number {
            font-size: 4rem;
            font-weight: 900;
            color: #e74c3c;
            line-height: 1;
            font-family: 'Playfair Display', serif;
        }

        .invalid-display .text {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Footer Controls */
        .footer-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-secondary {
            padding: 15px 30px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.8);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.4);
            color: white;
            transform: translateY(-2px);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
        }

        .vote-updated {
            animation: pulse-gold 0.6s ease;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .brand-header h1 {
                font-size: 2rem;
            }
            
            .setup-card {
                padding: 30px 20px;
            }
            
            .candidates-grid {
                grid-template-columns: 1fr;
            }
            
            .main-header h2 {
                font-size: 1.8rem;
            }
            
            .photo-mode-selector {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .photos-separate {
                flex-direction: column;
                align-items: center;
            }
            
            .photo-box {
                max-width: 200px;
                width: 100%;
            }
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="container">
        <!-- Setup Page -->
        <div class="setup-page" id="setupPage">
            <div class="brand-header">
                <h1>SMKN 5 Madiun</h1>
                <p>Sistem Pemilihan Umum</p>
            </div>
            
            <div class="setup-card">
                <div class="form-group">
                    <label>Masa Bakti Tahun</label>
                    <input type="text" id="tahunMasaBakti" placeholder="Contoh: 2024/2025">
                </div>
                
                <div class="form-group">
                    <label>Jumlah Kandidat</label>
                    <select id="jumlahKandidat">
                        <option value="">Pilih Jumlah</option>
                        <option value="2">2 Pasangan</option>
                        <option value="3">3 Pasangan</option>
                        <option value="4">4 Pasangan</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Mode Tampilan Foto</label>
                    <div class="photo-mode-selector">
                        <div class="mode-option active" onclick="selectMode('separate')" id="modeSeparate">
                            <span class="icon">👥</span>
                            <span class="label">Terpisah</span>
                            <small style="display: block; margin-top: 5px; opacity: 0.7; font-size: 0.75rem;">Ketua & Wakil</small>
                        </div>
                        <div class="mode-option" onclick="selectMode('combined')" id="modeCombined">
                            <span class="icon">🖼️</span>
                            <span class="label">Gabung</span>
                            <small style="display: block; margin-top: 5px; opacity: 0.7; font-size: 0.75rem;">Satu Foto</small>
                        </div>
                    </div>
                </div>
                
                <button class="btn-elegant" onclick="startVoting()">Mulai Pemilihan</button>
            </div>
        </div>

        <!-- Voting Page -->
        <div class="voting-page hidden" id="votingPage">
            <div class="main-header">
                <h2>Pemilu Ketua OSIS</h2>
                <div class="period" id="periodeText">Periode: -</div>
            </div>

            <div class="candidates-grid" id="candidatesContainer">
                <!-- Generated dynamically -->
            </div>

            <div class="invalid-section">
                <h3>⚠️ Suara Tidak Sah</h3>
                <div class="invalid-controls">
                    <button class="btn-control btn-minus" onclick="updateInvalid(-1)">−</button>
                    <div class="invalid-display">
                        <div class="number" id="invalidCount">0</div>
                        <div class="text">Suara</div>
                    </div>
                    <button class="btn-control btn-plus" onclick="updateInvalid(1)">+</button>
                </div>
            </div>

            <div class="footer-controls">
                <button class="btn-secondary" onclick="resetAll()">← Kembali</button>
                <button class="btn-secondary" onclick="window.print()">🖨️ Cetak</button>
            </div>
        </div>
    </div>

    <script>
        let photoMode = 'separate'; // 'separate' or 'combined'
        let candidates = [];
        let invalidVotes = 0;

        function selectMode(mode) {
            photoMode = mode;
            document.querySelectorAll('.mode-option').forEach(el => el.classList.remove('active'));
            document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
        }

        function startVoting() {
            const tahun = document.getElementById('tahunMasaBakti').value;
            const jumlah = document.getElementById('jumlahKandidat').value;
            
            if (!tahun || !jumlah) {
                alert('Harap lengkapi semua data terlebih dahulu!');
                return;
            }
            
            document.getElementById('periodeText').textContent = `Periode Masa Bakti: ${tahun}`;
            generateCandidates(parseInt(jumlah));
            
            document.getElementById('setupPage').classList.add('hidden');
            document.getElementById('votingPage').classList.remove('hidden');
        }

        function generateCandidates(count) {
            const container = document.getElementById('candidatesContainer');
            container.innerHTML = '';
            candidates = [];
            
            for (let i = 1; i <= count; i++) {
                candidates.push({ id: i, votes: 0 });
                
                const card = document.createElement('div');
                card.className = 'candidate-card';
                
                if (photoMode === 'separate') {
                    card.innerHTML = createSeparateMode(i);
                } else {
                    card.innerHTML = createCombinedMode(i);
                }
                
                container.appendChild(card);
            }
        }

        function createSeparateMode(i) {
            return `
                <div class="candidate-number">${i}</div>
                <div class="vote-counter">
                    <span class="count" id="count-${i}">0</span>
                    <span class="label">Suara</span>
                </div>
                <div class="photos-wrapper">
                    <div class="photos-separate">
                        <div class="photo-box">
                            <div class="photo-upload" onclick="document.getElementById('file-ketua-${i}').click()">
                                <input type="file" id="file-ketua-${i}" accept="image/*" onchange="handleImage(event, ${i}, 'ketua')">
                                <div class="upload-placeholder" id="ph-ketua-${i}">
                                    <span class="upload-icon">👤</span>
                                    <span class="upload-text">Ketua</span>
                                </div>
                            </div>
                            <div class="photo-label">
                                <div class="name">Kandidat ${i}</div>
                                <div class="role">Calon Ketua</div>
                            </div>
                        </div>
                        <div class="photo-box">
                            <div class="photo-upload" onclick="document.getElementById('file-wakil-${i}').click()">
                                <input type="file" id="file-wakil-${i}" accept="image/*" onchange="handleImage(event, ${i}, 'wakil')">
                                <div class="upload-placeholder" id="ph-wakil-${i}">
                                    <span class="upload-icon">👤</span>
                                    <span class="upload-text">Wakil</span>
                                </div>
                            </div>
                            <div class="photo-label">
                                <div class="name">Wakil ${i}</div>
                                <div class="role">Calon Wakil</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="vote-action">
                    <button class="btn-vote" onclick="addVote(${i})">
                        <span>+</span> Tambah Suara
                    </button>
                </div>
            `;
        }

        function createCombinedMode(i) {
            return `
                <div class="candidate-number">${i}</div>
                <div class="vote-counter">
                    <span class="count" id="count-${i}">0</span>
                    <span class="label">Suara</span>
                </div>
                <div class="photos-wrapper">
                    <div class="photos-combined">
                        <div class="photo-box">
                            <div class="photo-upload" onclick="document.getElementById('file-combined-${i}').click()">
                                <input type="file" id="file-combined-${i}" accept="image/*" onchange="handleImage(event, ${i}, 'combined')">
                                <div class="upload-placeholder" id="ph-combined-${i}">
                                    <span class="upload-icon">🖼️</span>
                                    <span class="upload-text">Foto Pasangan</span>
                                </div>
                            </div>
                            <div class="photo-label">
                                <div class="candidate-info">
                                    <div class="name">Kandidat ${i}</div>
                                    <div class="role">Ketua</div>
                                </div>
                                <div class="candidate-info">
                                    <div class="name">&</div>
                                    <div class="role">Wakil</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="vote-action">
                    <button class="btn-vote" onclick="addVote(${i})">
                        <span>+</span> Tambah Suara
                    </button>
                </div>
            `;
        }

        function handleImage(event, id, type) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const ph = document.getElementById(`ph-${type}-${id}`);
                const upload = ph.parentElement;
                
                ph.innerHTML = `<img src="${e.target.result}" alt="Foto">`;
                upload.classList.add('has-image');
            };
            reader.readAsDataURL(file);
        }

        function addVote(id) {
            const c = candidates[id - 1];
            c.votes++;
            
            const el = document.getElementById(`count-${id}`);
            el.textContent = c.votes;
            el.classList.add('vote-updated');
            setTimeout(() => el.classList.remove('vote-updated'), 600);
        }

        function updateInvalid(change) {
            invalidVotes += change;
            if (invalidVotes < 0) invalidVotes = 0;
            
            const el = document.getElementById('invalidCount');
            el.textContent = invalidVotes;
            el.classList.add('vote-updated');
            setTimeout(() => el.classList.remove('vote-updated'), 600);
        }

        function resetAll() {
            if (!confirm('Yakin ingin memulai ulang? Semua data akan hilang.')) return;
            
            candidates = [];
            invalidVotes = 0;
            document.getElementById('invalidCount').textContent = '0';
            document.getElementById('tahunMasaBakti').value = '';
            document.getElementById('jumlahKandidat').value = '';
            
            document.getElementById('votingPage').classList.add('hidden');
            document.getElementById('setupPage').classList.remove('hidden');
        }

        window.onbeforeunload = function() {
            if (!document.getElementById('votingPage').classList.contains('hidden')) {
                return "Data akan hilang jika meninggalkan halaman.";
            }
        };
    </script>
</body>
</html>
